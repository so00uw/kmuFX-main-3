<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Window 7 - 오류 찾기</title>
<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .window-container {
    position: relative;
    display: block;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .window-container img {
    pointer-events: none;
    -webkit-user-drag: none;
    user-drag: none;
  }

  .bg {
    position: absolute;
    top: 270px;
    left: 400px;
    width: 850px;
    height: auto;
    z-index: 1;
    object-fit: cover;
  }

  .frame {
    position: absolute;
    top: 0;
    left: 200px;
    width: 1200px;
    height: 1080px;
    object-fit: contain;
    z-index: 5;
    pointer-events: none;
  }

  .select-box {
    position: absolute;
    border: 4px solid #ff3333;
    background: rgba(255, 50, 50, 0.3);
    z-index: 10;
    pointer-events: none;
  }

  .popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 20;
    width: 800px;
    height: auto;
  }

  .popup img {
    display: block;
    width: 800px;
    height: auto;
  }

  .popup textarea {
    position: absolute;
    top: 280px;
    left: 110px;
    width: 580px;
    height: 120px;
    border: none;
    outline: none;
    background: transparent;
    resize: none;
    font-size: 50px;
    font-weight: bold;
    color: #000000;
    text-align: center;
  }

  .popup button {
    position: absolute;
    top: 475px;
    left: 670px;
    width: 80px;
    height: 40px;
    background: transparent;
    color: transparent;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
    opacity: 0;
    transition: transform 0.25s;
  }
  .popup button:hover {
    transform: scale(1.05);
  }

  .result-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 30;
    width: 800px;
  }

  .result-box img {
    width: 800px;
    height: auto;
    display: block;
  }

  .okay-btn {
    position: absolute;
    bottom: 125px;
    left: 52%;
    transform: translateX(-50%);
    width: 120px;
    height: 35px;
    background: transparent;
    color: transparent;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
    opacity: 0;
    transition: transform 0.25s;
  }
  .okay-btn:hover {
    transform: translateX(-50%);
  }

  .fail {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    display: none;
    width: 800px;
  }

  .fail img {
    width: 800px;
    height: auto;
  }
</style>
</head>
<body>
<div class="window-container" id="stage">
  <img src="../img/window7/a.png" class="bg" id="main" draggable="false">
  <img src="../img/window7/b.png" class="frame" id="frame" draggable="false">
</div>

<div class="popup" id="popup">
  <img src="../img/window7/c.png" alt="popup frame" draggable="false">
  <textarea id="input" placeholder="여기에 입력 "></textarea>
  <button id="submit">제출</button>
</div>

<div class="result-box" id="resultBox">
  <img src="../img/window7/g.png" alt="success image" draggable="false">
  <button class="okay-btn" id="okayBtn">OKAY</button>
</div>

<div class="fail" id="failBox">
  <img src="../img/window7/e.png" alt="fail image" draggable="false">
</div>

<script>
const stage = document.getElementById('stage');
const popup = document.getElementById('popup');
const input = document.getElementById('input');
const submit = document.getElementById('submit');
const resultBox = document.getElementById('resultBox');
const okayBtn = document.getElementById('okayBtn');
const failBox = document.getElementById('failBox');

let startX = 0;
let startY = 0;
let endX = 0;
let endY = 0;
let selectBox = null;
let isDragging = false;

stage.addEventListener('dragstart', e => e.preventDefault());

function openPromptPopup() {
  popup.style.display = 'block';
  input.value = '';
  setTimeout(() => input.focus(), 0);
}

stage.addEventListener('mousedown', e => {
  const rect = stage.getBoundingClientRect();
  startX = e.clientX - rect.left;
  startY = e.clientY - rect.top;
  endX = startX;
  endY = startY;
  isDragging = true;

  selectBox = document.createElement('div');
  selectBox.className = 'select-box';
  stage.appendChild(selectBox);

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);

  e.preventDefault();
});

function onMouseMove(e) {
  if (!isDragging) return;

  const rect = stage.getBoundingClientRect();
  endX = e.clientX - rect.left;
  endY = e.clientY - rect.top;

  const left = Math.min(endX, startX);
  const top = Math.min(endY, startY);
  const width = Math.abs(endX - startX);
  const height = Math.abs(endY - startY);

  Object.assign(selectBox.style, {
    left: left + 'px',
    top: top + 'px',
    width: width + 'px',
    height: height + 'px'
  });
}

function onMouseUp(e) {
  if (!isDragging) return;
  isDragging = false;

  const dx = Math.abs(endX - startX);
  const dy = Math.abs(endY - startY);
  const distance = Math.hypot(dx, dy);

  if (selectBox) {
    selectBox.remove();
    selectBox = null;
  }

  /* ✅ 클릭이든 드래그든 모두 팝업 열기 */
  openPromptPopup();

  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);

  e.preventDefault();
}

submit.addEventListener('click', () => {
  const text = input.value.trim();

  popup.style.display = 'none';

  /* ✅ 숫자 5 또는 6만 포함되어 있으면 정답 처리 */
  const hasCorrectNumber = /[56]/.test(text);

  if (hasCorrectNumber) {
    resultBox.style.display = 'block';
  } else {
    failBox.style.display = 'block';
    setTimeout(() => {
      failBox.style.display = 'none';
    }, 1500);
  }
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submit.click();
  }
});

okayBtn.addEventListener('click', () => {
  resultBox.style.display = 'none';

  if (window.parent && window.parent.showWindow8) {
    console.log("✅ 부모의 showWindow8() 호출됨");
    window.parent.showWindow8();
  } else {
    console.log("⚠️ 부모 없음 → 단독 실행 모드로 window8.html로 이동");
    window.location.href = "window8.html";
  }
});
</script>
</body>
</html>
