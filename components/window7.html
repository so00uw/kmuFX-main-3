<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Window 7 - 오류 찾기</title>
<style>
  body {
    margin: 0;
    background: transparent; /* ✅ 검은 배경 완전히 제거 */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* ✅ 부모 컨테이너 */
  .window-container {
    position: relative;
    display: block;
    width: 1920px;   /* 고정 해상도 기준 */
    height: 1080px;
    overflow: hidden;

    /* 드래그/선택 방지 */
    -webkit-user-select: none;
    user-select: none;
  }

  /* 컨테이너 안의 이미지가 이벤트/드래그 잡아먹지 않도록 */
  .window-container img {
    pointer-events: none;        /* 클릭·드래그 이벤트 통과 */
    -webkit-user-drag: none;     /* 사파리/크롬 이미지 드래그 방지 */
    user-drag: none;
  }

  /* ✅ 배경 이미지 (절대 위치 px 단위) */
  .bg {
    position: absolute;
    top: 300px;
    left: 450px;
    width: 800px;
    height: auto;
    z-index: 1;
    object-fit: cover;
  }

  /* ✅ 프레임 */
  .frame {
    position: absolute;
    top: 0;
    left: 200px;
    width: 1200px;
    height: 1080px;
    object-fit: contain;
    z-index: 5;
    pointer-events: none; /* 기존 유지 */
  }

  .select-box {
    position: absolute;
    border: 4px solid #ff3333;
    background: rgba(255, 50, 50, 0.3);
    z-index: 10;
    pointer-events: none;
  }

  /* ✅ 팝업창 (중앙 정렬) */
  .popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);  /* 중앙 정렬 */
    display: none;
    z-index: 20;
    width: 800px;
    height: auto;
  }

  .popup img {
    display: block;
    width: 800px;
    height: auto;
  }

  /* ✅ 입력창 */
  .popup textarea {
    position: absolute;
    top: 300px;
    left: 110px;
    width: 580px;
    height: 120px;
    border: none;
    outline: none;
    background: transparent;
    resize: none;
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    text-align: center;
  }

  /* ✅ 제출 버튼 (완전히 투명하게) */
  .popup button {
    position: absolute;
    top: 475px;
    left: 670px;
    width: 80px;
    height: 40px;
    background: transparent;
    color: transparent;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
    opacity: 0;
    transition: transform 0.25s;
  }
  .popup button:hover {
    transform: scale(1.05);
  }

  /* ✅ 정답 결과창 (중앙 정렬) */
  .result-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 30;
    width: 800px;
  }

  .result-box img {
    width: 800px;
    height: auto;
    display: block;
  }

  /* ✅ OKAY 버튼 (완전히 투명하게) */
  .okay-btn {
    position: absolute;
    bottom: 125px; /* 창 내부 하단 여백 */
    left: 52%;
    transform: translateX(-50%);
    width: 120px;
    height: 35px;
    background: transparent;
    color: transparent;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
    opacity: 0;
    transition: transform 0.25s;
  }
  .okay-btn:hover {
    transform: none;
  }

  /* ✅ 실패 결과창 (중앙 정렬) */
  .fail {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    display: none;
    width: 800px;
  }

  .fail img {
    width: 800px;
    height: auto;
  }
</style>
</head>
<body>
<div class="window-container" id="stage">
  <img src="../img/window7/a.png" class="bg" id="main" draggable="false">
  <img src="../img/window7/b.png" class="frame" id="frame" draggable="false">
</div>

<div class="popup" id="popup">
  <img src="../img/window7/c.png" alt="popup frame" draggable="false">
  <textarea id="input" placeholder="여기에 입력 "></textarea>
  <button id="submit">제출</button>
</div>

<div class="result-box" id="resultBox">
  <img src="../img/window7/g.png" alt="success image" draggable="false">
  <button class="okay-btn" id="okayBtn">OKAY</button>
</div>

<div class="fail" id="failBox">
  <img src="../img/window7/e.png" alt="fail image" draggable="false">
</div>

<script>
const stage = document.getElementById('stage');
const popup = document.getElementById('popup');
const input = document.getElementById('input');
const submit = document.getElementById('submit');
const resultBox = document.getElementById('resultBox');
const okayBtn = document.getElementById('okayBtn');
const failBox = document.getElementById('failBox');

let startX, startY, endX, endY, selectBox, isDragging = false;

// 이미지 기본 드래그 방지 (이중 안전장치)
stage.addEventListener('dragstart', e => e.preventDefault());

// ✅ 드래그 박스
stage.addEventListener('mousedown', e => {
  const rect = stage.getBoundingClientRect();
  startX = e.clientX - rect.left;
  startY = e.clientY - rect.top;
  endX = startX;
  endY = startY;
  isDragging = true;

  selectBox = document.createElement('div');
  selectBox.className = 'select-box';
  stage.appendChild(selectBox);

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);

  // 기본 선택/드래그 동작 방지
  e.preventDefault();
});

function onMouseMove(e) {
  if (!isDragging) return;
  const rect = stage.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  endX = x;
  endY = y;
  const left = Math.min(x, startX);
  const top = Math.min(y, startY);
  const width = Math.abs(x - startX);
  const height = Math.abs(y - startY);
  Object.assign(selectBox.style, {
    left: left + 'px',
    top: top + 'px',
    width: width + 'px',
    height: height + 'px'
  });
}

function onMouseUp(e) {
  if (!isDragging) return;
  isDragging = false;

  // 드래그 이동 거리 계산
  const dx = Math.abs((endX ?? startX) - startX);
  const dy = Math.abs((endY ?? startY) - startY);
  const distance = Math.hypot(dx, dy);

  if (selectBox) selectBox.remove();

  // ✅ 드래그(10px 이상)일 때만 팝업 표시
  if (distance > 10) {
    popup.style.display = 'block';
    input.value = '';
    input.focus();
  }

  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);

  // 기본 동작 방지
  e.preventDefault();
}

// ✅ 제출 버튼
submit.addEventListener('click', () => {
  const text = input.value.trim().toLowerCase();
  popup.style.display = 'none';

  if (text.includes('손가락') && (text.includes('6') || text.includes('여섯'))) {
    resultBox.style.display = 'block';
  } else {
    failBox.style.display = 'block';
    setTimeout(() => failBox.style.display = 'none', 1500);
  }
});

// ✅ OKAY 버튼 → 다음 페이지 이동
okayBtn.addEventListener('click', () => {
  resultBox.style.display = 'none';

  if (window.parent && window.parent.showWindow8) {
    console.log("✅ 부모의 showWindow8() 호출됨");
    window.parent.showWindow8();   // index.html 내부 이동
  } else {
    console.log("⚠️ 부모 없음 → 단독 실행 모드로 window8.html로 이동");
    window.location.href = "window8.html";  // 독립 실행 시
  }
});

</script>
</body>
</html>
