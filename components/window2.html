<div id="window2" class="window window2" style="left:0; top:0; width:700px; border:none; box-shadow:none;">
  <img src="../img/window2/bdimg.png" alt="window2 background" class="win2-bg" draggable="false">

  <div class="win2-doors" id="doorLayer">
    <img src="../img/window2/door_1.png" class="door" id="door1" draggable="false">
    <img src="../img/window2/door_2.png" class="door" id="door2" draggable="false">
    <img src="../img/window2/door_3.png" class="door" id="door3" draggable="false">
    <img src="../img/window2/door_4.png" class="door" id="door4" draggable="false">
  </div>

  <!-- window2 첫 진입 팝업 -->
  <div class="intro-popup show" id="introPopup">
    <div class="intro-popup-inner">
      <img src="../img/window2/Group 9.jpg" alt="intro popup" class="intro-popup-img" draggable="false">
      <button class="intro-yes-hotspot" id="introYesButton" aria-label="yes"></button>
    </div>
  </div>

  <div class="popup" id="popup1">
    <img src="../img/window2/popup_1.png" draggable="false">
    <div class="popup-close" data-popup="1"></div>
  </div>
  <div class="popup" id="popup2">
    <img src="../img/window2/popup_2.png" draggable="false">
    <div class="popup-close" data-popup="2"></div>
  </div>
  <div class="popup" id="popup3">
    <img src="../img/window2/popup_3.png" draggable="false">
    <div class="popup-close" data-popup="3"></div>
  </div>
  <div class="popup" id="popup4">
    <img src="../img/window2/popup_4.png" draggable="false">
    <div class="popup-close" data-popup="4"></div>
  </div>

  <div class="pzpop" id="pzpop1">
    <img src="../img/window2/pzpop_1.png" draggable="false">
    <div class="pz-okay" data-pz="1"></div>
  </div>
  <div class="pzpop" id="pzpop2">
    <img src="../img/window2/pzpop_2.png" draggable="false">
    <div class="pz-okay" data-pz="2"></div>
  </div>
  <div class="pzpop" id="pzpop3">
    <img src="../img/window2/pzpop_3.png" draggable="false">
    <div class="pz-okay" data-pz="3"></div>
  </div>
  <div class="pzpop" id="pzpop4">
    <img src="../img/window2/pzpop_4.png" draggable="false">
    <div class="pz-okay" data-pz="4"></div>
  </div>

  <style>
    #window2 {
      position: relative;
      overflow: hidden;
    }

    .win2-bg {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .win2-doors {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .win2-doors.enabled {
      pointer-events: auto;
    }

    .door {
      position: absolute;
      cursor: pointer;
      transition:
        transform 0.28s ease,
        filter 0.28s ease,
        opacity 0.28s ease,
        box-shadow 0.28s ease;
      transform-origin: left center;
      will-change: transform, filter;
    }

    .door.active {
      transform: scale(1.05);
      filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.95))
        drop-shadow(0 0 18px rgba(255,255,255,0.8))
        drop-shadow(0 0 30px rgba(255,255,255,0.55));
      z-index: 5;
    }

    .door.dimmed {
      filter: blur(5px) brightness(0.75);
      opacity: 0.72;
    }

    .door.open {
      transform: rotateY(-25deg);
    }

    #door1 { left: 90px; top: 180px; width: 150px; }
    #door2 { left: 230px; top: 200px; width: 170px; }
    #door3 { left: 380px; top: 120px; width: 170px; }
    #door4 { left: 530px; top: 230px; width: 150px; }

    .intro-popup {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 50;
      background: transparent;
    }

    .intro-popup.hidden {
      display: none;
    }

    .intro-popup-inner {
      position: relative;
      width: 314px;
      height: 130px;
      margin-top: 250px;
      margin-left: -150px;
    }

    .intro-popup-img {
      width: 150%;
      height: 150%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .intro-yes-hotspot {
      position: absolute;
      left: 155px;
      top: 129px;
      width: 102px;
      height: 51px;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      z-index: 2;
    }

    .popup,
    .pzpop {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.4s ease, opacity 0.3s ease;
      opacity: 0;
      z-index: 10;
    }

    .popup img, .pzpop img {
      width: 400px;
      height: auto;
      display: block;
      pointer-events: none;
    }

    .popup.show, .pzpop.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .popup-close, .pz-close {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      background: transparent;
    }

    .pz-okay {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      width: 120px;
      height: 50px;
      cursor: pointer;
      background: transparent;
    }

    .pzpop {
      z-index: 20;
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const window2 = document.getElementById('window2');
      const doorLayer = window2.querySelector('#doorLayer');
      const doors = window2.querySelectorAll('.door');
      const popupCloses = window2.querySelectorAll('.popup-close');
      const okayButtons = window2.querySelectorAll('.pz-okay');
      const introPopup = window2.querySelector('#introPopup');
      const introYesButton = window2.querySelector('#introYesButton');

      function setDoorHoverState(activeDoor) {
        doors.forEach((door) => {
          if (door === activeDoor) {
            door.classList.add('active');
            door.classList.remove('dimmed');
          } else {
            door.classList.remove('active');
            door.classList.add('dimmed');
          }
        });
      }

      function resetDoorHoverState() {
        doors.forEach((door) => {
          door.classList.remove('active');
          door.classList.remove('dimmed');
        });
      }

      introYesButton.addEventListener('click', () => {
        introPopup.classList.add('hidden');
        doorLayer.classList.add('enabled');
      });

      doors.forEach((door, index) => {
        door.addEventListener('mouseenter', () => {
          setDoorHoverState(door);
        });

        door.addEventListener('click', () => {
          door.classList.add('open');
          const popup = document.getElementById(`popup${index + 1}`);
          popup.classList.add('show');
        });
      });

      doorLayer.addEventListener('mouseleave', () => {
        resetDoorHoverState();
      });

      popupCloses.forEach(area => {
        area.addEventListener('click', () => {
          const num = area.dataset.popup;
          const popup = document.getElementById(`popup${num}`);
          const pz = document.getElementById(`pzpop${num}`);

          popup.classList.remove('show');
          pz.classList.add('show');
        });
      });

      okayButtons.forEach(area => {
        area.addEventListener('click', (e) => {
          e.stopPropagation();
          const num = area.dataset.pz;
          console.log(`퍼즐 조각 ${num} 획득! → window4로 전환`);

          if (window.parent && window.parent.showWindow4) {
            window.parent.showWindow4();
          } else {
            window.location.href = "window4.html";
          }
        });
      });
    });
  </script>
</div>
